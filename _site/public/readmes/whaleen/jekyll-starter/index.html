<h1>jekyll-starter</h1>
<h2>Quite possibly the best Jekyll Starter ever!</h2>
<p>Tired of stripping unwanted code, configurations, package manager waste, and other crap you don't need?</p>
<p>Type <code>jekyll new PATH --blank</code> into your Terminal. Replace <code>PATH</code> with the name of your project.</p>
